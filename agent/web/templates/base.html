<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}linkedin-agent{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="nav">
  <div class="brand"><span class="mark">—</span> linkedin agent</div>
  <nav>
    <a href="/"         class="{% if active == 'queue'    %}on{% endif %}">Queue</a>
    <a href="/compose"  class="{% if active == 'compose'  %}on{% endif %}">Compose</a>
    <a href="/artifact" class="{% if active == 'artifact' %}on{% endif %}">Artifact</a>
    <a href="/events"   class="{% if active == 'events'   %}on{% endif %}">Events</a>
    <a href="/history"  class="{% if active == 'history'  %}on{% endif %}">History</a>
    <a href="/repos"    class="{% if active == 'repos'    %}on{% endif %}">Repos</a>
    <a href="/stats"    class="{% if active == 'stats'    %}on{% endif %}">Stats</a>
    <a href="/settings" class="{% if active == 'settings' %}on{% endif %}">Settings</a>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="foot">
  <span>localhost — never touches LinkedIn directly</span>
</footer>
</body>
</html>
